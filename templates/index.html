<!DOCTYPE html>
<html>
<head>
    <title>Sales Predictor</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body style="font-family: Arial; text-align:center; margin-top:50px;">
    <style>
body { background: #f5f5f5; }
form { background: white; padding: 20px; display:inline-block; border-radius:10px; }
button { background: blue; color:white; padding:10px; }
</style>

<h2>📊 Sales Prediction System</h2>

<form action="/predict" method="post">
    <input type="number" name="price" placeholder="Price" required><br><br>
    <input type="date" name="date" required><br><br>

    <select name="product">
        <option value="A">Product A</option>
        <option value="B">Product B</option>
    </select><br><br>

    <button type="submit">Predict</button>
    <button formaction="/forecast">Forecast 7 Days</button>
</form>
<canvas id="salesChart" width="400" height="200"></canvas>

<h3>
{% if prediction %}
    🔥 Predicted Sales: {{ prediction }}
{% endif %}
</h3>
<h3>
    {% if forecast %}
    <h3>7-Day Forecast</h3>
    <ul>
    {% for item in forecast %}
        <li>{{ item.date }} → {{ item.sales }}</li>
    {% endfor %}
    </ul>
{% endif %}
</h3>

</body>
</html>

{% if dates and sales %}
<script>
    const labels = {{ dates | tojson }};
    const data = {{ sales | tojson }};

    const ctx = document.getElementById('salesChart').getContext('2d');

    new Chart(ctx, {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{
                label: 'Predicted Sales',
                data: data,
                borderWidth: 2,
                fill: false
            }]
        }
    });
</script>
{% endif %}
