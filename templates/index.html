<!DOCTYPE html>
<html>
<head>
    <title>Sales Predictor</title>
</head>
<body style="font-family: Arial; text-align:center; margin-top:50px;">
    <style>
body { background: #f5f5f5; }
form { background: white; padding: 20px; display:inline-block; border-radius:10px; }
button { background: blue; color:white; padding:10px; }
</style>

<h2>📊 Sales Prediction System</h2>

<form action="/predict" method="post">
    <input type="number" name="price" placeholder="Price" required><br><br>
    <input type="date" name="date" required><br><br>

    <select name="product">
        <option value="A">Product A</option>
        <option value="B">Product B</option>
    </select><br><br>

    <button type="submit">Predict</button>
    <button formaction="/forecast">Forecast 7 Days</button>
</form>

<h3>
{% if prediction %}
    🔥 Predicted Sales: {{ prediction }}
{% endif %}
</h3>

</body>
</html>
